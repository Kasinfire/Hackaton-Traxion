
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagnóstico Walmart - Traxión</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/diagnostico-styles.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="topbar__logo">
        <h1>Customer Health Agent</h1>
        <span class="badge badge--brand">EJE 2 - TRAXIÓN</span>
      </div>
      <div class="topbar__filters">
        <a
          href="index.html"
          class="btn btn--pill"
          style="
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
          "
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Inicio
        </a>
        <button
          class="btn btn--pill active"
          style="display: flex; align-items: center; gap: 6px"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path
              d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
            ></path>
          </svg>
          Re-run Analysis
        </button>
      </div>
    </header>

    <!-- ================= HERO ================= -->
    <div class="hero">
      <h1 class="hero__title" id="client-name"></h1>
      <p class="hero__meta" id="client-meta"></p>

      <div class="hero__tags">
        <span class="hero__tag" id="client-sector"></span>
        <span class="hero__tag" id="client-operation"></span>
        <span class="hero__tag">Último análisis: 20 de diciembre de 2025</span>
      </div>
    </div>

    <div class="body-wrap">
      <!-- ================= SEMÁFORO ================= -->
      <div class="semaforo-sidebar">
        <div class="semaforo">
          <div id="luz-roja" class="semaforo__luz red"></div>
          <div id="luz-amarilla" class="semaforo__luz yellow"></div>
          <div id="luz-verde" class="semaforo__luz green"></div>
        </div>

        <p class="semaforo__label">Nivel de Riesgo</p>
        <p id="client-risk" class="semaforo__risk"></p>
      </div>

      <main class="main">
        <!-- ================= KPIs ================= -->
        <section class="kpi-row">
          <div class="kpi-card">
            <p class="kpi-card__title">NS</p>
            <p id="kpi-otif" class="kpi-card__value"></p>
            <div class="progress-bar-bg">
              <div id="bar-otif" class="progress-bar-fill"></div>
            </div>
            <p class="kpi-card__meta">Meta: ≥ 95%</p>
          </div>

          <div class="kpi-card">
            <p class="kpi-card__title">Puntualidad</p>
            <p id="kpi-puntual" class="kpi-card__value"></p>
            <div class="progress-bar-bg">
              <div id="bar-puntual" class="progress-bar-fill"></div>
            </div>
            <p class="kpi-card__meta">Meta: ≥ 92%</p>
          </div>

          <div class="kpi-card">
            <p class="kpi-card__title">NPS</p>
            <p id="kpi-nps" class="kpi-card__value"></p>
            <div class="progress-bar-bg">
              <div id="bar-nps" class="progress-bar-fill"></div>
            </div>
            <p class="kpi-card__meta">Meta: ≥ 8</p>
          </div>

          <div class="kpi-card">
            <p class="kpi-card__title">Quejas Abiertas</p>
            <p id="kpi-quejas" class="kpi-card__value"></p>
            <div class="progress-bar-bg">
              <div id="bar-quejas" class="progress-bar-fill"></div>
            </div>
            <p class="kpi-card__meta">Límite aceptable: ≤ 2</p>
          </div>
        </section>

        <!-- ================= DIAGNÓSTICO + FINDINGS ================= -->
        <section class="content-grid">
          <div class="card">
            <div class="card__heading">Diagnóstico</div>
            <div id="diagnostico" class="diagnostico-text"></div>
          </div>

          <div class="card">
            <div class="card__heading">Hallazgos Clave</div>
            <div id="findings"></div>
          </div>
        </section>

        <!-- ================= ACCIONES ================= -->
        <section>
          <div class="section-heading"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Acciones Sugeridas</div>
          <div id="actions" class="actions-grid"></div>
        </section>
      </main>
    </div>

    <!-- ================= JS ================= -->
    <script src="js/data.js"></script>
    <script src="js/diagnostico-js.js"></script>
  </body>
</html>
